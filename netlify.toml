[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[redirects]]
  from = "https://timoerlemans.nl/*"
  to = "https://tim.oerlemans.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://timoerlemans.nl/*"
  to = "http://tim.oerlemans.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.timoerlemans.nl/*"
  to = "https://tim.oerlemans.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.timoerlemans.nl/*"
  to = "http://tim.oerlemans.dev/:splat"
  status = 301
  force = true
