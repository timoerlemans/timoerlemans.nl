[build.environment]
  NODE_VERSION = "24"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://cloud.umami.is https://api-gateway.umami.dev; form-action 'self' oerlemans.substack.com; frame-ancestors 'none'; frame-src oerlemans.substack.com; upgrade-insecure-requests"

[[redirects]]
  from = "https://timoerlemans.nl/*"
  to = "https://tim.oerlemans.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://timoerlemans.nl/*"
  to = "https://tim.oerlemans.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.timoerlemans.nl/*"
  to = "https://tim.oerlemans.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.timoerlemans.nl/*"
  to = "https://tim.oerlemans.dev/:splat"
  status = 301
  force = true
